spring:
  datasource:
    url: url
    username: username
    password: [Password]
    driver-class-name: name

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

cloudinary:
  cloud-name: name
  api-key: key
  api-secret: secret